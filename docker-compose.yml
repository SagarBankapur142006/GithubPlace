services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ideora
      POSTGRES_PASSWORD: ideora
      POSTGRES_DB: ideora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - fulfillment_data:/app/fulfillment_packages

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m worker.scheduler
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  fulfillment_data:
