services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ideora
      POSTGRES_PASSWORD: ideora
      POSTGRES_DB: ideora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - USE_SQLITE=false
      - DATABASE_URL=postgresql+asyncpg://ideora:ideora@postgres:5432/ideora
      - SYNC_DATABASE_URL=postgresql://ideora:ideora@postgres:5432/ideora
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - fulfillment_data:/app/fulfillment_packages

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m worker.scheduler
    env_file:
      - ./backend/.env
    environment:
      - USE_SQLITE=false
      - DATABASE_URL=postgresql+asyncpg://ideora:ideora@postgres:5432/ideora
      - SYNC_DATABASE_URL=postgresql://ideora:ideora@postgres:5432/ideora
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
  fulfillment_data:
